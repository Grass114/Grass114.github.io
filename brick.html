<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="favicon.png" type="image/png" />
    <title>🧱 打砖块 · BlueCat114</title>
    <style>
        /* ===== 字体加载 ===== */
        @font-face {
            font-family: 'Minecraft';
            src: url('Minecraft.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
        }

        /* ===== 颜色变量 ===== */
        :root {
            --bg-start: #f5f9ff;
            --bg-end: #e6edf7;
            --card-bg: rgba(255, 255, 255, 0.7);
            --card-border: rgba(255, 255, 255, 0.8);
            --text-primary: #0b1e33;
            --text-secondary: #1e293b;
            --text-muted: #64748b;
            --text-light: #94a3b8;
            --shadow-color: rgba(0, 20, 40, 0.08);
            --shadow-hover: rgba(0, 20, 40, 0.12);
            --topbar-bg: rgba(255, 255, 255, 0.6);
            --topbar-border: rgba(255, 255, 255, 0.8);
            --footer-border: rgba(255, 255, 255, 0.6);
            --link-color: #6c63ff;
            --link-hover: #4a42b8;
            --clock-color: var(--text-muted);
            --game-wrapper-bg: rgba(255, 255, 255, 0.85);
            --game-wrapper-border: rgba(0, 0, 0, 0.04);
            --hud-bg: rgba(255, 255, 255, 0.7);
            --hud-text: #1a1a2e;
            --overlay-bg: rgba(255, 255, 255, 0.82);
            --overlay-text: #1a1a2e;
            --overlay-sub: rgba(0, 0, 0, 0.55);
        }

        [data-theme="dark"] {
            --bg-start: #0f1724;
            --bg-end: #1a2332;
            --card-bg: rgba(30, 41, 59, 0.8);
            --card-border: rgba(71, 85, 105, 0.5);
            --text-primary: #e2e8f0;
            --text-secondary: #cbd5e1;
            --text-muted: #94a3b8;
            --text-light: #64748b;
            --shadow-color: rgba(0, 0, 0, 0.3);
            --shadow-hover: rgba(0, 0, 0, 0.4);
            --topbar-bg: rgba(15, 23, 36, 0.8);
            --topbar-border: rgba(71, 85, 105, 0.5);
            --footer-border: rgba(71, 85, 105, 0.4);
            --link-color: #818cf8;
            --link-hover: #a5b4fc;
            --clock-color: #94a3b8;
            --game-wrapper-bg: rgba(30, 41, 59, 0.7);
            --game-wrapper-border: rgba(71, 85, 105, 0.4);
            --hud-bg: rgba(30, 41, 59, 0.7);
            --hud-text: #e2e8f0;
            --overlay-bg: rgba(15, 23, 36, 0.85);
            --overlay-text: #e2e8f0;
            --overlay-sub: rgba(255, 255, 255, 0.55);
        }

        /* ===== 全局重置 ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        html,
        body {
            height: 100%;
            width: 100%;
        }

        body {
            font-family: 'Minecraft', 'Microsoft YaHei', 'PingFang SC', sans-serif;
            background: linear-gradient(145deg, var(--bg-start) 0%, var(--bg-end) 100%);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            padding: 70px 24px 24px 24px;
            transition: background 0.4s ease, color 0.4s ease;
            color: var(--text-primary);
        }

        /* ===== 导航条 ===== */
        .top-bar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 1000;
            padding: 12px 28px;
            background: var(--topbar-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--topbar-border);
            box-shadow: 0 2px 12px var(--shadow-color);
            transition: background 0.4s ease, border-color 0.4s ease;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .top-bar-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .top-bar-right {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .top-bar .site-title {
            font-size: 18px;
            font-weight: 600;
            color: var(--text-primary);
            text-decoration: none;
            letter-spacing: 0.3px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: color 0.2s;
        }

        .top-bar .site-title:hover {
            color: var(--link-color);
        }

        .top-bar .site-title::before {
            content: "🏠";
            font-size: 20px;
        }

        .top-bar .nav-link {
            font-size: 16px;
            font-weight: 500;
            color: var(--text-secondary);
            text-decoration: none;
            transition: color 0.2s;
            padding: 4px 0;
            border-bottom: 2px solid transparent;
        }

        .top-bar .nav-link::before {
            content: "｜";
            margin-right: 10px;
            color: var(--text-light);
            font-weight: 300;
        }

        .top-bar .nav-link:hover {
            color: var(--link-color);
            border-bottom-color: var(--link-color);
        }

        .top-bar .nav-link.active {
            color: var(--link-color);
            border-bottom-color: var(--link-color);
        }

        /* ===== 时钟显示 ===== */
        .clock-display {
            font-size: 16px;
            font-weight: 500;
            color: var(--clock-color);
            letter-spacing: 0.5px;
            font-variant-numeric: tabular-nums;
            transition: color 0.4s;
            cursor: default;
            user-select: none;
            min-width: 80px;
            text-align: right;
        }

        .clock-display:hover {
            color: var(--link-color);
        }

        /* ===== 主题切换按钮 ===== */
        .theme-toggle {
            background: none;
            border: none;
            font-size: 22px;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 30px;
            transition: background 0.3s;
            color: var(--text-primary);
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            line-height: 1;
        }

        .theme-toggle:hover {
            background: rgba(0, 0, 0, 0.06);
            transform: scale(1.1);
        }

        /* ===== 主容器 ===== */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            max-width: 820px;
            margin: 0 auto;
            padding: 20px 0;
        }

        /* ===== 返回按钮（在游戏上方） ===== */
        .back-link {
            align-self: flex-start;
            margin-bottom: 16px;
            font-size: 15px;
            font-weight: 500;
        }

        .back-link a {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: var(--link-color);
            text-decoration: none;
            transition: color 0.2s;
            border-bottom: 2px solid transparent;
        }

        .back-link a:hover {
            color: var(--link-hover);
            border-bottom-color: var(--link-hover);
        }

        /* ===== 游戏容器（跟随主题） ===== */
        .game-wrapper {
            background: var(--game-wrapper-bg);
            backdrop-filter: blur(8px);
            border-radius: 40px;
            padding: 30px 30px 35px;
            box-shadow: 0 20px 60px var(--shadow-color), 0 2px 10px var(--shadow-color);
            border: 1px solid var(--game-wrapper-border);
            transition: all 0.4s ease;
            width: 100%;
        }

        .game-container {
            position: relative;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: inset 0 0 30px rgba(0, 0, 0, 0.02), 0 8px 32px rgba(0, 0, 0, 0.04);
            background: #f8f9fc;
        }

        /* ===== 画布 ===== */
        #gameCanvas {
            display: block;
            width: 780px;
            height: 520px;
            background: #f2f4f8;
            cursor: none;
            touch-action: none;
            max-width: 100%;
            height: auto;
            aspect-ratio: 780 / 520;
        }

        /* ===== HUD ===== */
        .hud {
            position: absolute;
            top: 18px;
            left: 0;
            width: 100%;
            padding: 0 28px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            pointer-events: none;
            z-index: 10;
            font-weight: 600;
            text-shadow: 0 2px 8px rgba(255, 255, 255, 0.6);
        }

        .hud-item {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--hud-text);
            font-size: 18px;
            letter-spacing: 0.3px;
            background: var(--hud-bg);
            backdrop-filter: blur(4px);
            padding: 6px 18px 6px 14px;
            border-radius: 40px;
            border: 1px solid rgba(0, 0, 0, 0.04);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.02);
            transition: background 0.4s, color 0.4s;
        }

        .hud-item .icon {
            font-size: 20px;
            line-height: 1;
        }
        .hud-item .value {
            font-size: 22px;
            min-width: 28px;
            text-align: center;
            color: var(--hud-text);
        }
        .hud-item .value.lives {
            color: #e74c3c;
        }
        .hud-item .value.score {
            color: #e67e22;
        }

        /* ===== 遮罩层（跟随主题） ===== */
        .overlay {
            position: absolute;
            inset: 0;
            z-index: 20;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: var(--overlay-bg);
            backdrop-filter: blur(8px);
            border-radius: 24px;
            padding: 40px;
            text-align: center;
            animation: overlayIn 0.4s ease forwards;
            transition: background 0.4s;
        }

        .overlay.show {
            display: flex;
        }

        @keyframes overlayIn {
            0% { opacity: 0; transform: scale(0.96); }
            100% { opacity: 1; transform: scale(1); }
        }

        .overlay-title {
            font-size: 56px;
            font-weight: 800;
            color: var(--overlay-text);
            margin-bottom: 8px;
            letter-spacing: 2px;
            transition: color 0.4s;
        }
        .overlay-title.win {
            color: #e67e22;
            -webkit-text-fill-color: #e67e22;
        }
        .overlay-title.lose {
            color: #e74c3c;
            -webkit-text-fill-color: #e74c3c;
        }

        .overlay-sub {
            font-size: 20px;
            color: var(--overlay-sub);
            margin-bottom: 28px;
            font-weight: 400;
            transition: color 0.4s;
        }

        .overlay-score {
            font-size: 28px;
            color: #e67e22;
            font-weight: 700;
            margin-bottom: 30px;
            background: rgba(0, 0, 0, 0.02);
            padding: 8px 32px;
            border-radius: 40px;
            border: 1px solid rgba(0, 0, 0, 0.04);
        }

        /* ===== 按钮 ===== */
        .btn {
            pointer-events: auto;
            background: linear-gradient(135deg, #6c5ce7, #a29bfe);
            border: none;
            color: #fff;
            font-size: 20px;
            font-weight: 700;
            padding: 14px 48px;
            border-radius: 60px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 8px 24px rgba(108, 92, 231, 0.25);
            letter-spacing: 0.5px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .btn:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 14px 32px rgba(108, 92, 231, 0.35);
        }
        .btn:active {
            transform: translateY(0px) scale(0.97);
        }

        .btn-restart {
            background: linear-gradient(135deg, #00b894, #00cec9);
            box-shadow: 0 8px 24px rgba(0, 206, 201, 0.25);
        }
        .btn-restart:hover {
            box-shadow: 0 14px 32px rgba(0, 206, 201, 0.4);
        }

        /* ===== 控制提示（跟随主题） ===== */
        .controls-hint {
            display: flex;
            justify-content: center;
            gap: 32px;
            margin-top: 18px;
            color: var(--text-muted);
            font-size: 14px;
            font-weight: 400;
            letter-spacing: 0.5px;
            transition: color 0.4s;
        }

        .controls-hint span {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .controls-hint kbd {
            background: rgba(0, 0, 0, 0.04);
            padding: 2px 12px;
            border-radius: 6px;
            border: 1px solid rgba(0, 0, 0, 0.06);
            font-size: 13px;
            color: var(--text-secondary);
            font-family: inherit;
            transition: color 0.4s;
        }

        /* ===== 页脚 ===== */
        .footer {
            text-align: center;
            font-size: 14px;
            color: var(--text-muted);
            padding-top: 22px;
            border-top: 1px solid var(--footer-border);
            width: 100%;
            margin-top: 24px;
            letter-spacing: 0.3px;
            transition: color 0.4s, border-color 0.4s;
        }

        .footer a {
            color: var(--link-color);
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s;
        }

        .footer a:hover {
            color: var(--link-hover);
            text-decoration: underline;
        }

        /* ===== 响应式 ===== */
        @media (max-width: 820px) {
            .game-wrapper {
                padding: 16px;
                border-radius: 28px;
            }
            .game-container {
                border-radius: 14px;
            }
            .hud {
                top: 12px;
                padding: 0 16px;
            }
            .hud-item {
                font-size: 14px;
                padding: 4px 12px 4px 10px;
            }
            .hud-item .value {
                font-size: 17px;
                min-width: 20px;
            }
            .overlay-title {
                font-size: 38px;
            }
            .btn {
                font-size: 17px;
                padding: 12px 34px;
            }
            .controls-hint {
                gap: 16px;
                font-size: 12px;
                flex-wrap: wrap;
            }
            .top-bar {
                padding: 10px 18px;
                flex-wrap: wrap;
                gap: 6px;
            }
            .top-bar .site-title {
                font-size: 16px;
            }
            .top-bar .nav-link {
                font-size: 14px;
            }
            .clock-display {
                font-size: 14px;
                min-width: 70px;
            }
            .theme-toggle {
                font-size: 18px;
                padding: 3px 6px;
            }
            .back-link {
                font-size: 14px;
            }
        }

        @media (max-width: 480px) {
            .game-wrapper {
                padding: 10px;
                border-radius: 20px;
            }
            .game-container {
                border-radius: 10px;
            }
            .hud-item {
                font-size: 11px;
                padding: 3px 8px 3px 6px;
                gap: 4px;
            }
            .hud-item .value {
                font-size: 14px;
                min-width: 16px;
            }
            .overlay-title {
                font-size: 28px;
            }
            .overlay-sub {
                font-size: 16px;
            }
            .btn {
                font-size: 15px;
                padding: 10px 26px;
            }
            .controls-hint {
                font-size: 10px;
                gap: 10px;
            }
            .controls-hint kbd {
                padding: 1px 8px;
                font-size: 10px;
            }
            .top-bar {
                padding: 8px 12px;
            }
            .top-bar .site-title {
                font-size: 14px;
            }
            .top-bar .nav-link {
                font-size: 12px;
            }
            .top-bar .nav-link::before {
                margin-right: 4px;
            }
            .clock-display {
                font-size: 12px;
                min-width: 60px;
            }
            .theme-toggle {
                font-size: 16px;
                padding: 2px 5px;
            }
            .back-link {
                font-size: 13px;
            }
        }
    </style>
</head>
<body>

    <!-- ===== 导航条 ===== -->
    <div class="top-bar">
        <div class="top-bar-left">
            <a href="index.html" class="site-title">BlueCat114 官方网站</a>
            <a href="project.html" class="nav-link">项目</a>
            <a href="game.html" class="nav-link active">网页游戏</a>
            <a href="thankyou.html" class="nav-link">致谢</a>
        </div>
        <div class="top-bar-right">
            <div class="clock-display" id="clockDisplay" title="双击恢复自动模式">--:--:--</div>
            <button class="theme-toggle" id="themeToggle" aria-label="切换暗色/亮色模式">☀️</button>
        </div>
    </div>

    <!-- ===== 主要内容 ===== -->
    <div class="main">

        <!-- 返回游戏中心 -->
        <div class="back-link">
            <a href="game.html">← 返回游戏中心</a>
        </div>

        <!-- 游戏容器 -->
        <div class="game-wrapper">
            <div class="game-container">

                <!-- 画布 -->
                <canvas id="gameCanvas" width="780" height="520"></canvas>

                <!-- HUD -->
                <div class="hud">
                    <div class="hud-item">
                        <span class="icon">🏆</span>
                        <span class="value score" id="scoreDisplay">0</span>
                    </div>
                    <div class="hud-item">
                        <span class="icon">❤️</span>
                        <span class="value lives" id="livesDisplay">3</span>
                    </div>
                </div>

                <!-- 遮罩 -->
                <div class="overlay" id="overlay">
                    <div class="overlay-title" id="overlayTitle">🎉 恭喜!</div>
                    <div class="overlay-sub" id="overlaySub">你太厉害了！</div>
                    <div class="overlay-score" id="overlayScore">得分: 0</div>
                    <button class="btn btn-restart" id="restartBtn">🔄 再来一局</button>
                </div>

            </div>

            <!-- 操作提示 -->
            <div class="controls-hint">
                <span>⬅️ <kbd>←</kbd> <kbd>→</kbd> 移动</span>
                <span>🖱️ 鼠标拖动挡板</span>
                <span>␣ <kbd>空格</kbd> 发射 / 重新开始</span>
            </div>
        </div>

        <!-- 页脚 -->
        <div class="footer">
            © <span id="year"></span> <a href="https://github.com/grass114">BlueCat114</a> · 用 ❤️ 和 ☕ 打造
        </div>

    </div>

    <script>
        // ============================================================
        //  打砖块游戏（你的完整代码，未改动）
        // ============================================================
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreSpan = document.getElementById('scoreDisplay');
        const livesSpan = document.getElementById('livesDisplay');
        const overlay = document.getElementById('overlay');
        const overlayTitle = document.getElementById('overlayTitle');
        const overlaySub = document.getElementById('overlaySub');
        const overlayScore = document.getElementById('overlayScore');
        const restartBtn = document.getElementById('restartBtn');

        const W = 780, H = 520;
        const PADDLE_WIDTH = 100, PADDLE_HEIGHT = 14, PADDLE_Y = H - 36;
        const BALL_RADIUS = 9;
        const BALL_SPEED_INIT = 8.0, BALL_MAX_SPEED = 13.0, PADDLE_SPEED = 12;
        const BRICK_ROWS = 6, BRICK_COLS = 10, BRICK_W = 66, BRICK_H = 22, BRICK_GAP = 6, BRICKS_TOP = 52;

        let paddle = { x: (W - PADDLE_WIDTH) / 2 };
        let ball = { x: W / 2, y: PADDLE_Y - BALL_RADIUS - 2, dx: 0, dy: 0 };
        let bricks = [];
        let score = 0, lives = 3, gameState = 'idle', animationId = null;

        const BRICK_COLORS = [
            ['#FF6B6B', '#EE5A5A'], ['#FF9F43', '#F1903A'], ['#FECA57', '#F0B848'],
            ['#48DBFB', '#2EC4E6'], ['#A29BFE', '#8C84E8'], ['#55EFC4', '#3DDCAE'],
        ];

        function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }

        function initBricks() {
            bricks = [];
            for (let r = 0; r < BRICK_ROWS; r++) {
                for (let c = 0; c < BRICK_COLS; c++) {
                    const x = c * (BRICK_W + BRICK_GAP) + BRICK_GAP / 2 + 10;
                    const y = r * (BRICK_H + BRICK_GAP) + BRICK_GAP / 2 + BRICKS_TOP;
                    const colorIdx = r % BRICK_COLORS.length;
                    bricks.push({ x, y, w: BRICK_W, h: BRICK_H, alive: true, color: BRICK_COLORS[colorIdx], row: r, col: c });
                }
            }
        }

        function resetBallStuck() {
            ball.x = paddle.x + PADDLE_WIDTH / 2;
            ball.y = PADDLE_Y - BALL_RADIUS - 2;
            ball.dx = 0; ball.dy = 0;
            gameState = 'idle';
        }

        function launchBall() {
            if (gameState !== 'idle') return;
            const angle = -Math.PI / 2 + (Math.random() - 0.5) * 0.8;
            const speed = BALL_SPEED_INIT;
            ball.dx = Math.cos(angle) * speed;
            ball.dy = Math.sin(angle) * speed;
            gameState = 'running';
        }

        function resetGame() {
            paddle.x = (W - PADDLE_WIDTH) / 2;
            initBricks();
            score = 0; lives = 3;
            updateHUD();
            resetBallStuck();
            overlay.classList.remove('show');
            overlay.style.display = 'none';
            gameState = 'idle';
        }

        function updateHUD() {
            scoreSpan.textContent = score;
            livesSpan.textContent = lives;
        }

        function showOverlay(won) {
            overlay.style.display = 'flex';
            requestAnimationFrame(() => overlay.classList.add('show'));
            if (won) {
                overlayTitle.textContent = '🎉 恭喜通关！';
                overlayTitle.className = 'overlay-title win';
                overlaySub.textContent = '你打碎了所有砖块，太棒啦！';
            } else {
                overlayTitle.textContent = '💔 游戏结束';
                overlayTitle.className = 'overlay-title lose';
                overlaySub.textContent = '别灰心，再试一次吧！';
            }
            overlayScore.textContent = `得分: ${score}`;
        }

        function gameOver() { gameState = 'over'; showOverlay(false); }
        function gameWin() { gameState = 'win'; showOverlay(true); }

        function ballBrickCollision(brick) {
            const cx = ball.x, cy = ball.y, r = BALL_RADIUS;
            const rx = brick.x, ry = brick.y, rw = brick.w, rh = brick.h;
            const nearestX = clamp(cx, rx, rx + rw);
            const nearestY = clamp(cy, ry, ry + rh);
            const distX = cx - nearestX, distY = cy - nearestY;
            return (distX * distX + distY * distY) < (r * r);
        }

        function handleBrickCollisions() {
            for (const brick of bricks) {
                if (!brick.alive) continue;
                if (!ballBrickCollision(brick)) continue;
                brick.alive = false;
                score += 10 + brick.row * 2;
                updateHUD();
                const bx = brick.x + brick.w / 2, by = brick.y + brick.h / 2;
                const dx = ball.x - bx, dy = ball.y - by;
                const len = Math.sqrt(dx * dx + dy * dy);
                if (len > 0.001) {
                    const nx = dx / len, ny = dy / len;
                    const dot = ball.dx * nx + ball.dy * ny;
                    if (dot < 0) {
                        ball.dx -= 2 * dot * nx;
                        ball.dy -= 2 * dot * ny;
                        ball.dx += (Math.random() - 0.5) * 0.4;
                        ball.dy += (Math.random() - 0.5) * 0.4;
                        let sp = Math.sqrt(ball.dx * ball.dx + ball.dy * ball.dy);
                        sp = Math.min(sp * 1.02, BALL_MAX_SPEED);
                        if (sp > 0.01) {
                            ball.dx = (ball.dx / Math.sqrt(ball.dx * ball.dx + ball.dy * ball.dy)) * sp;
                            ball.dy = (ball.dy / Math.sqrt(ball.dx * ball.dx + ball.dy * ball.dy)) * sp;
                        }
                    }
                } else { ball.dy = -Math.abs(ball.dy); }
                const overlap = BALL_RADIUS + 1;
                const pushX = (ball.x > bx) ? overlap : -overlap;
                const pushY = (ball.y > by) ? overlap : -overlap;
                if (Math.abs(ball.dx) > Math.abs(ball.dy)) ball.x += pushX * 0.5;
                else ball.y += pushY * 0.5;
                break;
            }
        }

        function update() {
            if (gameState !== 'running') return;
            ball.x += ball.dx; ball.y += ball.dy;
            if (ball.x - BALL_RADIUS < 0) { ball.x = BALL_RADIUS; ball.dx = Math.abs(ball.dx); }
            else if (ball.x + BALL_RADIUS > W) { ball.x = W - BALL_RADIUS; ball.dx = -Math.abs(ball.dx); }
            if (ball.y - BALL_RADIUS < 0) { ball.y = BALL_RADIUS; ball.dy = Math.abs(ball.dy); }
            if (ball.y + BALL_RADIUS > H) {
                lives--; updateHUD();
                if (lives <= 0) { gameOver(); return; }
                else { resetBallStuck(); paddle.x = (W - PADDLE_WIDTH) / 2; return; }
            }
            const px = paddle.x, py = PADDLE_Y;
            const pw = PADDLE_WIDTH, ph = PADDLE_HEIGHT;
            const cx = ball.x, cy = ball.y, r = BALL_RADIUS;
            const nearX = clamp(cx, px, px + pw), nearY = clamp(cy, py, py + ph);
            const distX = cx - nearX, distY = cy - nearY;
            if (distX * distX + distY * distY < r * r && ball.dy > 0) {
                const hitPos = (ball.x - px) / pw;
                const angle = (hitPos - 0.5) * 1.2;
                let speed = Math.sqrt(ball.dx * ball.dx + ball.dy * ball.dy);
                speed = Math.min(speed * 1.01, BALL_MAX_SPEED);
                ball.dx = Math.sin(angle) * speed;
                ball.dy = -Math.cos(angle) * speed;
                ball.y = PADDLE_Y - BALL_RADIUS - 1;
            }
            handleBrickCollisions();
            if (bricks.every(b => !b.alive)) { gameWin(); return; }
            const sp = Math.sqrt(ball.dx * ball.dx + ball.dy * ball.dy);
            if (sp > BALL_MAX_SPEED) { ball.dx = (ball.dx / sp) * BALL_MAX_SPEED; ball.dy = (ball.dy / sp) * BALL_MAX_SPEED; }
        }

        function draw() {
            ctx.clearRect(0, 0, W, H);
            const bgGrad = ctx.createLinearGradient(0, 0, 0, H);
            bgGrad.addColorStop(0, '#f8f9fc'); bgGrad.addColorStop(1, '#eef1f5');
            ctx.fillStyle = bgGrad; ctx.fillRect(0, 0, W, H);
            ctx.strokeStyle = 'rgba(0,0,0,0.03)'; ctx.lineWidth = 1;
            for (let i = 0; i < W; i += 40) { ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, H); ctx.stroke(); }
            for (let i = 0; i < H; i += 40) { ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(W, i); ctx.stroke(); }
            for (const brick of bricks) {
                if (!brick.alive) continue;
                const { x, y, w, h, color } = brick;
                const [topColor, bottomColor] = color;
                const gradBrick = ctx.createLinearGradient(x, y, x, y + h);
                gradBrick.addColorStop(0, topColor); gradBrick.addColorStop(1, bottomColor);
                ctx.fillStyle = gradBrick;
                ctx.shadowColor = 'rgba(0,0,0,0.04)'; ctx.shadowBlur = 8;
                ctx.beginPath(); ctx.roundRect(x, y, w, h, 6); ctx.fill();
                ctx.shadowBlur = 0;
                ctx.strokeStyle = 'rgba(0,0,0,0.10)'; ctx.lineWidth = 1.2;
                ctx.beginPath(); ctx.roundRect(x, y, w, h, 6); ctx.stroke();
                ctx.fillStyle = 'rgba(255,255,255,0.35)';
                ctx.beginPath(); ctx.roundRect(x + 4, y + 2, w - 8, 5, 3); ctx.fill();
            }
            const px = paddle.x, py = PADDLE_Y;
            const pw = PADDLE_WIDTH, ph = PADDLE_HEIGHT;
            ctx.shadowColor = 'rgba(108, 92, 231, 0.2)'; ctx.shadowBlur = 20;
            const gradPaddle = ctx.createLinearGradient(px, py, px, py + ph);
            gradPaddle.addColorStop(0, '#8c7cf0'); gradPaddle.addColorStop(0.5, '#6c5ce7'); gradPaddle.addColorStop(1, '#4a3db8');
            ctx.fillStyle = gradPaddle;
            ctx.beginPath(); ctx.roundRect(px, py, pw, ph, 10); ctx.fill();
            ctx.shadowBlur = 0;
            ctx.strokeStyle = 'rgba(0,0,0,0.08)'; ctx.lineWidth = 1.5;
            ctx.beginPath(); ctx.roundRect(px, py, pw, ph, 10); ctx.stroke();
            ctx.fillStyle = 'rgba(255,255,255,0.25)';
            ctx.beginPath(); ctx.roundRect(px + 12, py + 3, pw - 24, 5, 4); ctx.fill();

            if (gameState === 'idle') {
                ctx.shadowColor = 'rgba(230, 126, 34, 0.25)'; ctx.shadowBlur = 25;
                const gradBall = ctx.createRadialGradient(ball.x - 3, ball.y - 4, 2, ball.x, ball.y, BALL_RADIUS + 2);
                gradBall.addColorStop(0, '#fff5b0'); gradBall.addColorStop(0.6, '#f7d44a'); gradBall.addColorStop(1, '#d4a020');
                ctx.fillStyle = gradBall;
                ctx.beginPath(); ctx.arc(ball.x, ball.y, BALL_RADIUS, 0, Math.PI * 2); ctx.fill();
                ctx.shadowBlur = 0;
                ctx.strokeStyle = 'rgba(0,0,0,0.08)'; ctx.lineWidth = 1.2;
                ctx.beginPath(); ctx.arc(ball.x, ball.y, BALL_RADIUS, 0, Math.PI * 2); ctx.stroke();
                ctx.fillStyle = 'rgba(255,255,255,0.7)';
                ctx.beginPath(); ctx.arc(ball.x - 3, ball.y - 4, 3.5, 0, Math.PI * 2); ctx.fill();
                ctx.fillStyle = 'rgba(0,0,0,0.25)';
                ctx.font = '14px "Segoe UI", sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText('按 空格键 发射', W / 2, PADDLE_Y + 44);
            } else {
                ctx.shadowColor = 'rgba(230, 126, 34, 0.3)'; ctx.shadowBlur = 28;
                const gradBall = ctx.createRadialGradient(ball.x - 3, ball.y - 4, 2, ball.x, ball.y, BALL_RADIUS + 2);
                gradBall.addColorStop(0, '#fffde0'); gradBall.addColorStop(0.5, '#f7d44a'); gradBall.addColorStop(1, '#d4a020');
                ctx.fillStyle = gradBall;
                ctx.beginPath(); ctx.arc(ball.x, ball.y, BALL_RADIUS, 0, Math.PI * 2); ctx.fill();
                ctx.shadowBlur = 0;
                ctx.strokeStyle = 'rgba(0,0,0,0.08)'; ctx.lineWidth = 1.2;
                ctx.beginPath(); ctx.arc(ball.x, ball.y, BALL_RADIUS, 0, Math.PI * 2); ctx.stroke();
                ctx.fillStyle = 'rgba(255,255,255,0.7)';
                ctx.beginPath(); ctx.arc(ball.x - 3, ball.y - 4, 3.5, 0, Math.PI * 2); ctx.fill();
            }
            const aliveCount = bricks.filter(b => b.alive).length;
            ctx.fillStyle = 'rgba(0,0,0,0.10)';
            ctx.font = '13px "Segoe UI", sans-serif';
            ctx.textAlign = 'right';
            ctx.fillText(`剩余 ${aliveCount} 块`, W - 20, H - 12);
        }

        if (!CanvasRenderingContext2D.prototype.roundRect) {
            CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, radii) {
                const r = typeof radii === 'number' ? radii : (radii || 0);
                this.moveTo(x + r, y);
                this.arcTo(x + w, y, x + w, y + h, r);
                this.arcTo(x + w, y + h, x, y + h, r);
                this.arcTo(x, y + h, x, y, r);
                this.arcTo(x, y, x + w, y, r);
                return this;
            };
        }

        function gameLoop() { update(); draw(); animationId = requestAnimationFrame(gameLoop); }

        const keys = { left: false, right: false };
        function handleKeyDown(e) {
            const key = e.key;
            if (key === 'ArrowLeft' || key === 'Left' || key === 'a' || key === 'A') {
                e.preventDefault(); keys.left = true;
            } else if (key === 'ArrowRight' || key === 'Right' || key === 'd' || key === 'D') {
                e.preventDefault(); keys.right = true;
            } else if (key === ' ' || key === 'Space') {
                e.preventDefault();
                if (gameState === 'idle') launchBall();
                else if (gameState === 'over' || gameState === 'win') resetGame();
            } else if (key === 'r' || key === 'R') {
                if (gameState === 'over' || gameState === 'win') resetGame();
            }
        }
        function handleKeyUp(e) {
            const key = e.key;
            if (key === 'ArrowLeft' || key === 'Left' || key === 'a' || key === 'A') { e.preventDefault(); keys.left = false; }
            else if (key === 'ArrowRight' || key === 'Right' || key === 'd' || key === 'D') { e.preventDefault(); keys.right = false; }
            else if (key === ' ' || key === 'Space') e.preventDefault();
        }

        function handlePointerMove(e) {
            if (gameState === 'over' || gameState === 'win') return;
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            let clientX = e.clientX;
            if (e.touches) { clientX = e.touches[0].clientX; e.preventDefault(); }
            let canvasX = (clientX - rect.left) * scaleX;
            canvasX = clamp(canvasX, PADDLE_WIDTH / 2, W - PADDLE_WIDTH / 2);
            paddle.x = canvasX - PADDLE_WIDTH / 2;
            if (gameState === 'idle') { ball.x = paddle.x + PADDLE_WIDTH / 2; ball.y = PADDLE_Y - BALL_RADIUS - 2; }
        }
        function handlePointerDown(e) {
            if (gameState === 'idle') launchBall();
            else if (gameState === 'over' || gameState === 'win') resetGame();
            if (e.type === 'touchstart') e.preventDefault();
        }

        function updatePaddleByKeys() {
            if (gameState === 'over' || gameState === 'win') return;
            if (keys.left) {
                paddle.x = clamp(paddle.x - PADDLE_SPEED, 0, W - PADDLE_WIDTH);
                if (gameState === 'idle') { ball.x = paddle.x + PADDLE_WIDTH / 2; ball.y = PADDLE_Y - BALL_RADIUS - 2; }
            }
            if (keys.right) {
                paddle.x = clamp(paddle.x + PADDLE_SPEED, 0, W - PADDLE_WIDTH);
                if (gameState === 'idle') { ball.x = paddle.x + PADDLE_WIDTH / 2; ball.y = PADDLE_Y - BALL_RADIUS - 2; }
            }
        }
        const originalUpdate = update;
        update = function() { updatePaddleByKeys(); originalUpdate(); };

        function resetKeys() { keys.left = false; keys.right = false; }

        function init() {
            resetGame();
            window.addEventListener('keydown', handleKeyDown);
            window.addEventListener('keyup', handleKeyUp);
            window.addEventListener('blur', resetKeys);
            canvas.addEventListener('mousemove', handlePointerMove);
            canvas.addEventListener('mousedown', handlePointerDown);
            canvas.addEventListener('touchmove', handlePointerMove, { passive: false });
            canvas.addEventListener('touchstart', handlePointerDown, { passive: false });
            restartBtn.addEventListener('click', resetGame);
            if (animationId) cancelAnimationFrame(animationId);
            gameLoop();
        }
        init();

        // ============================================================
        //  网站主题控制（时钟 + 暗色/亮色切换）
        // ============================================================
        document.getElementById('year').textContent = new Date().getFullYear();

        const clockDisplay = document.getElementById('clockDisplay');
        const toggle = document.getElementById('themeToggle');
        const html = document.documentElement;

        let isAutoMode = true;
        let currentTheme = 'light';

        function getThemeByHour() {
            const h = new Date().getHours();
            return (h >= 6 && h < 18) ? 'light' : 'dark';
        }

        function updateClock() {
            const now = new Date();
            const h = String(now.getHours()).padStart(2, '0');
            const m = String(now.getMinutes()).padStart(2, '0');
            const s = String(now.getSeconds()).padStart(2, '0');
            clockDisplay.textContent = h + ':' + m + ':' + s;

            if (isAutoMode) {
                const target = getThemeByHour();
                if (target !== currentTheme) {
                    currentTheme = target;
                    html.setAttribute('data-theme', target);
                    toggle.textContent = target === 'dark' ? '🌙' : '☀️';
                }
            }
        }

        // 双击时钟恢复自动模式
        clockDisplay.addEventListener('dblclick', function() {
            isAutoMode = true;
            const target = getThemeByHour();
            currentTheme = target;
            html.setAttribute('data-theme', target);
            toggle.textContent = target === 'dark' ? '🌙' : '☀️';
            updateClock();
        });

        // 手动切换主题
        toggle.addEventListener('click', function() {
            isAutoMode = false;
            const current = html.getAttribute('data-theme');
            const next = current === 'dark' ? 'light' : 'dark';
            currentTheme = next;
            html.setAttribute('data-theme', next);
            toggle.textContent = next === 'dark' ? '🌙' : '☀️';
        });

        // 初始化
        const initTheme = getThemeByHour();
        currentTheme = initTheme;
        html.setAttribute('data-theme', initTheme);
        toggle.textContent = initTheme === 'dark' ? '🌙' : '☀️';
        updateClock();
        setInterval(updateClock, 1000);
    </script>
