<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的个人官网</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: #f0f2f5;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .card {
            background: white;
            padding: 50px 60px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.08);
            text-align: center;
            max-width: 500px;
        }
        .avatar {
            font-size: 80px;
            margin-bottom: 10px;
        }
        h1 {
            font-size: 28px;
            color: #1a1a2e;
            margin-bottom: 8px;
        }
        .title {
            color: #6c63ff;
            font-size: 16px;
            font-weight: 500;
            margin-bottom: 16px;
        }
        .bio {
            color: #555;
            font-size: 14px;
            line-height: 1.8;
            margin-bottom: 24px;
        }
        .links a {
            display: inline-block;
            margin: 0 8px;
            padding: 10px 24px;
            background: #6c63ff;
            color: white;
            text-decoration: none;
            border-radius: 30px;
            font-size: 14px;
            transition: background 0.2s;
        }
        .links a:hover {
            background: #5a52d5;
        }
        .download {
            margin-top: 16px;
        }
        .download a {
            color: #6c63ff;
            text-decoration: none;
            font-size: 14px;
            border: 1.5px solid #6c63ff;
            padding: 8px 20px;
            border-radius: 30px;
            transition: 0.2s;
        }
        .download a:hover {
            background: #6c63ff;
            color: white;
        }
        .footer {
            margin-top: 20px;
            font-size: 12px;
            color: #aaa;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="avatar">👋</div>
        <h1>张三</h1>
        <div class="title">全栈开发者 · 内容创作者</div>
        <div class="bio">
            热爱编程、设计和分享。<br>
            欢迎来到我的个人小站。
        </div>
        <div class="links">
            <a href="#">GitHub</a>
            <a href="#">博客</a>
        </div>
        <div class="download">
            <a href="./我的简历.pdf" download>📄 下载简历</a>
        </div>
        <div class="footer">© 2026 张三 · 用 ❤️ 打造</div>
    </div>
</body>
</html>
