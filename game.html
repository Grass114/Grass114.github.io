<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="favicon.png" type="image/png" />
    <title>游戏中心 · BlueCat114</title>
    <style>
        /* ===== 字体加载 ===== */
        @font-face {
            font-family: 'Minecraft';
            src: url('Minecraft.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
        }

        /* ===== 颜色变量 ===== */
        :root {
            --bg-start: #f5f9ff;
            --bg-end: #e6edf7;
            --card-bg: rgba(255, 255, 255, 0.7);
            --card-border: rgba(255, 255, 255, 0.8);
            --text-primary: #0b1e33;
            --text-secondary: #1e293b;
            --text-muted: #64748b;
            --text-light: #94a3b8;
            --shadow-color: rgba(0, 20, 40, 0.08);
            --shadow-hover: rgba(0, 20, 40, 0.12);
            --topbar-bg: rgba(255, 255, 255, 0.6);
            --topbar-border: rgba(255, 255, 255, 0.8);
            --footer-border: rgba(255, 255, 255, 0.6);
            --link-color: #6c63ff;
            --link-hover: #4a42b8;
            --status-on: #22c55e;
            --status-off: #ef4444;
            --clock-color: var(--text-muted);
            --tab-bg: rgba(255, 255, 255, 0.5);
            --tab-active: #6c63ff;
            --tab-text: var(--text-secondary);
            --tab-hover: rgba(108, 99, 255, 0.1);
            --game-card-bg: rgba(255, 255, 255, 0.6);
            --game-card-border: rgba(255, 255, 255, 0.8);
        }

        [data-theme="dark"] {
            --bg-start: #0f1724;
            --bg-end: #1a2332;
            --card-bg: rgba(30, 41, 59, 0.8);
            --card-border: rgba(71, 85, 105, 0.5);
            --text-primary: #e2e8f0;
            --text-secondary: #cbd5e1;
            --text-muted: #94a3b8;
            --text-light: #64748b;
            --shadow-color: rgba(0, 0, 0, 0.3);
            --shadow-hover: rgba(0, 0, 0, 0.4);
            --topbar-bg: rgba(15, 23, 36, 0.8);
            --topbar-border: rgba(71, 85, 105, 0.5);
            --footer-border: rgba(71, 85, 105, 0.4);
            --link-color: #818cf8;
            --link-hover: #a5b4fc;
            --clock-color: #94a3b8;
            --status-on: #4ade80;
            --status-off: #f87171;
            --tab-bg: rgba(30, 41, 59, 0.6);
            --tab-active: #818cf8;
            --tab-text: #cbd5e1;
            --tab-hover: rgba(129, 140, 248, 0.15);
            --game-card-bg: rgba(30, 41, 59, 0.6);
            --game-card-border: rgba(71, 85, 105, 0.4);
        }

        /* ===== 全局重置 ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            height: 100%;
            width: 100%;
        }

        body {
            font-family: 'Minecraft', 'Microsoft YaHei', 'PingFang SC', sans-serif;
            background: linear-gradient(145deg, var(--bg-start) 0%, var(--bg-end) 100%);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            padding: 70px 24px 24px 24px;
            transition: background 0.4s ease, color 0.4s ease;
            color: var(--text-primary);
        }

        /* ===== 导航条 ===== */
        .top-bar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 1000;
            padding: 12px 28px;
            background: var(--topbar-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--topbar-border);
            box-shadow: 0 2px 12px var(--shadow-color);
            transition: background 0.4s ease, border-color 0.4s ease;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .top-bar-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .top-bar-right {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .top-bar .site-title {
            font-size: 18px;
            font-weight: 600;
            color: var(--text-primary);
            text-decoration: none;
            letter-spacing: 0.3px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: color 0.2s;
        }

        .top-bar .site-title:hover {
            color: var(--link-color);
        }

        .top-bar .site-title::before {
            content: "🏠";
            font-size: 20px;
        }

        .top-bar .nav-link {
            font-size: 16px;
            font-weight: 500;
            color: var(--text-secondary);
            text-decoration: none;
            transition: color 0.2s;
            padding: 4px 0;
            border-bottom: 2px solid transparent;
        }

        .top-bar .nav-link::before {
            content: "｜";
            margin-right: 10px;
            color: var(--text-light);
            font-weight: 300;
        }

        .top-bar .nav-link:hover {
            color: var(--link-color);
            border-bottom-color: var(--link-color);
        }

        .top-bar .nav-link.active {
            color: var(--link-color);
            border-bottom-color: var(--link-color);
        }

        /* ===== 时钟显示 ===== */
        .clock-display {
            font-size: 16px;
            font-weight: 500;
            color: var(--clock-color);
            letter-spacing: 0.5px;
            font-variant-numeric: tabular-nums;
            transition: color 0.4s;
            cursor: default;
            user-select: none;
            min-width: 80px;
            text-align: right;
        }

        .clock-display:hover {
            color: var(--link-color);
        }

        /* ===== 主题切换按钮 ===== */
        .theme-toggle {
            background: none;
            border: none;
            font-size: 22px;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 30px;
            transition: background 0.3s;
            color: var(--text-primary);
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            line-height: 1;
        }

        .theme-toggle:hover {
            background: rgba(0, 0, 0, 0.06);
            transform: scale(1.1);
        }

        /* ===== 主容器 ===== */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px 0;
            position: relative;
        }

        /* ===== 自动调节开关 ===== */
        .auto-toggle {
            position: absolute;
            top: 0;
            right: 0;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            padding: 4px 12px;
            border-radius: 20px;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            transition: all 0.3s;
            user-select: none;
            white-space: nowrap;
            z-index: 5;
            text-align: right;
            line-height: 1.6;
        }

        .auto-toggle:hover {
            transform: scale(1.05);
            border-color: var(--link-color);
        }

        .auto-toggle.on {
            color: var(--status-on);
        }

        .auto-toggle.off {
            color: var(--status-off);
        }

        .auto-toggle .hint {
            font-size: 12px;
            opacity: 0.7;
            display: block;
        }

        /* ===== 页面标题 ===== */
        .page-title {
            text-align: center;
            margin: 30px 0 24px 0;
            width: 100%;
        }

        .page-title h1 {
            font-size: 32px;
            font-weight: 700;
            color: var(--text-primary);
            letter-spacing: -0.3px;
            transition: color 0.4s;
        }

        .page-title p {
            color: var(--text-muted);
            font-size: 16px;
            margin-top: 4px;
            transition: color 0.4s;
        }

        /* ===== 选项卡栏（一行5个） ===== */
        .tab-bar {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
            width: 100%;
            max-width: 800px;
            margin-bottom: 24px;
        }

        .tab-btn {
            padding: 12px 8px;
            border: 2px solid var(--card-border);
            border-radius: 16px;
            background: var(--tab-bg);
            color: var(--tab-text);
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s ease;
            text-align: center;
            font-family: inherit;
            backdrop-filter: blur(4px);
            box-shadow: 0 2px 8px var(--shadow-color);
            text-decoration: none;
            display: block;
        }

        .tab-btn:hover {
            background: var(--tab-hover);
            transform: translateY(-2px);
            border-color: var(--link-color);
        }

        .tab-btn.active {
            background: var(--tab-active);
            color: white;
            border-color: var(--tab-active);
            box-shadow: 0 4px 16px rgba(108, 99, 255, 0.25);
        }

        .tab-btn .tab-icon {
            display: block;
            font-size: 28px;
            margin-bottom: 4px;
        }
        .tab-btn .tab-label {
            font-size: 13px;
        }

        /* ===== 游戏内容区 ===== */
        .game-content {
            width: 100%;
            max-width: 820px;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            0% { opacity: 0; transform: translateY(12px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        /* ===== 占位游戏卡片 ===== */
        .placeholder-game {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 60px 40px;
            text-align: center;
            background: var(--game-card-bg);
            backdrop-filter: blur(4px);
            border-radius: 20px;
            border: 2px dashed var(--card-border);
            min-height: 400px;
            transition: background 0.4s, border-color 0.4s;
        }

        .placeholder-game .big-icon {
            font-size: 72px;
            margin-bottom: 16px;
            opacity: 0.6;
        }
        .placeholder-game h2 {
            font-size: 28px;
            color: var(--text-primary);
            margin-bottom: 8px;
            transition: color 0.4s;
        }
        .placeholder-game p {
            color: var(--text-muted);
            font-size: 16px;
            max-width: 400px;
            transition: color 0.4s;
        }

        /* ===== 页脚 ===== */
        .footer {
            text-align: center;
            font-size: 14px;
            color: var(--text-muted);
            padding-top: 22px;
            border-top: 1px solid var(--footer-border);
            width: 100%;
            margin-top: 24px;
            letter-spacing: 0.3px;
            transition: color 0.4s, border-color 0.4s;
        }

        .footer a {
            color: var(--link-color);
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s;
        }

        .footer a:hover {
            color: var(--link-hover);
            text-decoration: underline;
        }

        /* ===== 响应式 ===== */
        @media (max-width: 820px) {
            .tab-bar {
                grid-template-columns: repeat(5, 1fr);
                gap: 6px;
            }
            .tab-btn {
                padding: 10px 4px;
                font-size: 13px;
                border-radius: 12px;
            }
            .tab-btn .tab-icon {
                font-size: 22px;
            }
            .tab-btn .tab-label {
                font-size: 11px;
            }
            .game-content .game-card {
                padding: 16px;
                border-radius: 20px;
            }
            .game-container {
                border-radius: 14px;
            }
            .top-bar {
                padding: 10px 18px;
                flex-wrap: wrap;
                gap: 6px;
            }
            .top-bar .site-title {
                font-size: 16px;
            }
            .top-bar .nav-link {
                font-size: 14px;
            }
            .clock-display {
                font-size: 14px;
                min-width: 70px;
            }
            .theme-toggle {
                font-size: 18px;
                padding: 3px 6px;
            }
            .page-title h1 {
                font-size: 26px;
            }
            .placeholder-game .big-icon {
                font-size: 48px;
            }
            .placeholder-game h2 {
                font-size: 22px;
            }
            .placeholder-game {
                padding: 40px 20px;
                min-height: 280px;
            }
            .auto-toggle {
                font-size: 13px;
                padding: 3px 10px;
                top: -4px;
                right: 0;
            }
        }

        @media (max-width: 480px) {
            .tab-bar {
                grid-template-columns: repeat(5, 1fr);
                gap: 4px;
            }
            .tab-btn {
                padding: 8px 2px;
                font-size: 11px;
                border-radius: 10px;
                border-width: 1.5px;
            }
            .tab-btn .tab-icon {
                font-size: 18px;
            }
            .tab-btn .tab-label {
                font-size: 9px;
            }
            .game-content .game-card {
                padding: 10px;
                border-radius: 14px;
            }
            .game-container {
                border-radius: 10px;
            }
            .top-bar {
                padding: 8px 12px;
            }
            .top-bar .site-title {
                font-size: 14px;
            }
            .top-bar .nav-link {
                font-size: 12px;
            }
            .top-bar .nav-link::before {
                margin-right: 4px;
            }
            .clock-display {
                font-size: 12px;
                min-width: 60px;
            }
            .theme-toggle {
                font-size: 16px;
                padding: 2px 5px;
            }
            .page-title h1 {
                font-size: 22px;
            }
            .placeholder-game .big-icon {
                font-size: 36px;
            }
            .placeholder-game h2 {
                font-size: 18px;
            }
            .placeholder-game {
                padding: 30px 16px;
                min-height: 200px;
            }
            .placeholder-game p {
                font-size: 14px;
            }
            .auto-toggle {
                font-size: 12px;
                padding: 2px 8px;
                top: -2px;
                right: 0;
            }
        }
    </style>
</head>
<body>

    <!-- 导航条 -->
    <div class="top-bar">
        <div class="top-bar-left">
            <a href="index.html" class="site-title">BlueCat114 官方网站</a>
            <a href="project.html" class="nav-link">项目</a>
            <a href="game.html" class="nav-link active">网页游戏</a>
            <a href="thankyou.html" class="nav-link">致谢</a>
        </div>
        <div class="top-bar-right">
            <div class="clock-display" id="clockDisplay" title="双击恢复自动模式">--:--:--</div>
            <button class="theme-toggle" id="themeToggle" aria-label="切换暗色/亮色模式">☀️</button>
        </div>
    </div>

    <!-- 主要内容 -->
    <div class="main">

        <div class="auto-toggle on" id="autoToggle">自动调节已开启！</div>

        <div class="page-title">
            <h1>🎮 游戏中心</h1>
            <p>选一个游戏，开始玩吧</p>
        </div>

        <!-- 选项卡栏（第一个是跳转链接） -->
        <div class="tab-bar">
            <a href="brick.html" class="tab-btn active">
                <span class="tab-icon">🧱</span>
                <span class="tab-label">打砖块</span>
            </a>
            <div class="tab-btn" style="cursor:default; opacity:0.6;">
                <span class="tab-icon">🔄</span>
                <span class="tab-label">即将推出</span>
            </div>
            <div class="tab-btn" style="cursor:default; opacity:0.6;">
                <span class="tab-icon">🔄</span>
                <span class="tab-label">即将推出</span>
            </div>
            <div class="tab-btn" style="cursor:default; opacity:0.6;">
                <span class="tab-icon">🔄</span>
                <span class="tab-label">即将推出</span>
            </div>
            <div class="tab-btn" style="cursor:default; opacity:0.6;">
                <span class="tab-icon">🔄</span>
                <span class="tab-label">即将推出</span>
            </div>
        </div>

        <!-- 游戏内容（占位，因为第一个是跳转，所以内容区显示提示） -->
        <div class="game-content">
            <div class="placeholder-game">
                <div class="big-icon">🎮</div>
                <h2>选择上面的游戏开始</h2>
                <p>点击“打砖块”进入游戏，其他游戏正在开发中，敬请期待！</p>
            </div>
        </div>

        <div class="footer">
            © <span id="year"></span> <a href="https://github.com/grass114">BlueCat114</a> · 用 ❤️ 和 ☕ 打造
        </div>

    </div>

    <script>
        // ===== 年份 =====
        document.getElementById('year').textContent = new Date().getFullYear();

        // ===== 时钟 + 主题控制 =====
        const clockDisplay = document.getElementById('clockDisplay');
        const toggle = document.getElementById('themeToggle');
        const html = document.documentElement;
        const autoToggle = document.getElementById('autoToggle');

        let isAutoMode = true;
        let currentTheme = 'light';

        function getThemeByHour() {
            const h = new Date().getHours();
            return (h >= 6 && h < 18) ? 'light' : 'dark';
        }

        function updateClock() {
            const now = new Date();
            const h = String(now.getHours()).padStart(2, '0');
            const m = String(now.getMinutes()).padStart(2, '0');
            const s = String(now.getSeconds()).padStart(2, '0');
            clockDisplay.textContent = h + ':' + m + ':' + s;

            if (isAutoMode) {
                const target = getThemeByHour();
                if (target !== currentTheme) {
                    currentTheme = target;
                    html.setAttribute('data-theme', target);
                    toggle.textContent = target === 'dark' ? '🌙' : '☀️';
                }
            }
        }

        function updateAutoToggle() {
            if (isAutoMode) {
                autoToggle.innerHTML = '自动调节已开启！';
                autoToggle.className = 'auto-toggle on';
            } else {
                autoToggle.innerHTML = '自动调节已关闭！<br><span class="hint">（双击时间恢复自动）</span>';
                autoToggle.className = 'auto-toggle off';
            }
        }

        autoToggle.addEventListener('click', function() {
            isAutoMode = !isAutoMode;
            updateAutoToggle();
            if (isAutoMode) {
                const target = getThemeByHour();
                currentTheme = target;
                html.setAttribute('data-theme', target);
                toggle.textContent = target === 'dark' ? '🌙' : '☀️';
            }
        });

        toggle.addEventListener('click', function() {
            if (isAutoMode) {
                isAutoMode = false;
                updateAutoToggle();
            }
            const current = html.getAttribute('data-theme');
            const next = current === 'dark' ? 'light' : 'dark';
            currentTheme = next;
            html.setAttribute('data-theme', next);
            toggle.textContent = next === 'dark' ? '🌙' : '☀️';
        });

        clockDisplay.addEventListener('dblclick', function() {
            isAutoMode = true;
            updateAutoToggle();
            const target = getThemeByHour();
            currentTheme = target;
            html.setAttribute('data-theme', target);
            toggle.textContent = target === 'dark' ? '🌙' : '☀️';
            updateClock();
        });

        const initTheme = getThemeByHour();
        currentTheme = initTheme;
        html.setAttribute('data-theme', initTheme);
        toggle.textContent = initTheme === 'dark' ? '🌙' : '☀️';
        updateAutoToggle();
        updateClock();
        setInterval(updateClock, 1000);
    </script>

</body>
</html>
