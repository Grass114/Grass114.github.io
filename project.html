<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="favicon.png" type="image/png" />
    <title>项目 · BlueCat114</title>
    <style>
        /* ===== 字体加载 ===== */
        @font-face {
            font-family: 'Minecraft';
            src: url('Minecraft.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
        }

        /* ===== 全局重置 ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            height: 100%;
            width: 100%;
        }

        body {
            font-family: 'Minecraft', 'Microsoft YaHei', 'PingFang SC', sans-serif;
            background: linear-gradient(145deg, #f5f9ff 0%, #e6edf7 100%);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            padding: 70px 24px 24px 24px;
        }

        /* ===== 左上角固定导航条 ===== */
        .top-bar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 1000;
            padding: 12px 28px;
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.8);
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.04);
            transition: background 0.3s;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .top-bar:hover {
            background: rgba(255, 255, 255, 0.8);
        }

        .top-bar .site-title {
            font-size: 18px;
            font-weight: 600;
            color: #0b1e33;
            text-decoration: none;
            letter-spacing: 0.3px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: color 0.2s;
        }

        .top-bar .site-title:hover {
            color: #6c63ff;
        }

        .top-bar .site-title::before {
            content: "🏠";
            font-size: 20px;
        }

        .top-bar .nav-link {
            font-size: 16px;
            font-weight: 500;
            color: #1e293b;
            text-decoration: none;
            transition: color 0.2s;
            padding: 4px 0;
            border-bottom: 2px solid transparent;
        }

        .top-bar .nav-link::before {
            content: "｜";
            margin-right: 10px;
            color: #94a3b8;
            font-weight: 300;
        }

        .top-bar .nav-link:hover {
            color: #6c63ff;
            border-bottom-color: #6c63ff;
        }

        .top-bar .nav-link.active {
            color: #6c63ff;
            border-bottom-color: #6c63ff;
        }

        /* ===== 主容器 ===== */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            width: 100%;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px 0;
        }

        /* ===== 页面标题 ===== */
        .page-header {
            text-align: center;
            margin-bottom: 36px;
        }

        .page-header h1 {
            font-size: 36px;
            font-weight: 700;
            color: #0b1e33;
            letter-spacing: -0.3px;
        }

        .page-header p {
            color: #64748b;
            font-size: 16px;
            margin-top: 8px;
        }

        /* ===== 项目列表 ===== */
        .project-list {
            display: flex;
            flex-direction: column;
            gap: 20px;
            width: 100%;
            max-width: 600px;
        }

        .project-item {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border-radius: 20px;
            padding: 24px 28px;
            border: 1px solid rgba(255, 255, 255, 0.8);
            box-shadow: 0 8px 28px rgba(0, 20, 40, 0.06);
            transition: all 0.25s ease;
            text-decoration: none;
            color: inherit;
            display: block;
        }

        .project-item:hover {
            transform: translateY(-4px);
            box-shadow: 0 14px 40px rgba(0, 20, 40, 0.10);
            border-color: rgba(108, 99, 255, 0.2);
        }

        .project-item h3 {
            font-size: 20px;
            font-weight: 600;
            color: #0b1e33;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .project-item .status {
            font-size: 12px;
            font-weight: 500;
            background: #d1fae5;
            color: #065f46;
            padding: 2px 12px;
            border-radius: 30px;
            margin-left: auto;
        }

        .project-item p {
            font-size: 15px;
            color: #475569;
            margin-top: 6px;
            line-height: 1.6;
        }

        .project-item .tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 12px;
        }

        .project-item .tags span {
            font-size: 12px;
            font-weight: 500;
            padding: 4px 14px;
            border-radius: 30px;
            border: 1px solid;
            transition: all 0.2s;
            cursor: default;
        }

        .project-item .tags span:hover {
            transform: scale(1.06);
        }

        /* ----- 各标签配色 ----- */
        .project-item .tags span.lang {
            background: linear-gradient(135deg, #10b981, #34d399);
            color: #064e3b;
            border-color: #10b981;
        }
        .project-item .tags span.lang:hover {
            background: linear-gradient(135deg, #059669, #10b981);
            color: white;
            box-shadow: 0 2px 12px rgba(16, 185, 129, 0.35);
        }

        .project-item .tags span.featured {
            background: linear-gradient(135deg, #6c63ff, #8b83f5);
            color: white;
            border-color: #6c63ff;
            box-shadow: 0 2px 8px rgba(108, 99, 255, 0.25);
        }
        .project-item .tags span.featured:hover {
            background: linear-gradient(135deg, #5a52d5, #7a72e5);
            box-shadow: 0 4px 16px rgba(108, 99, 255, 0.35);
        }

        .project-item .tags span.guide {
            background: linear-gradient(135deg, #06b6d4, #22d3ee);
            color: #164e63;
            border-color: #06b6d4;
        }
        .project-item .tags span.guide:hover {
            background: linear-gradient(135deg, #0891b2, #06b6d4);
            color: white;
            box-shadow: 0 2px 12px rgba(6, 182, 212, 0.35);
        }

        .project-item .tags span.tool {
            background: linear-gradient(135deg, #f59e0b, #fbbf24);
            color: #78350f;
            border-color: #f59e0b;
        }
        .project-item .tags span.tool:hover {
            background: linear-gradient(135deg, #d97706, #f59e0b);
            color: white;
            box-shadow: 0 2px 12px rgba(245, 158, 11, 0.35);
        }

        .project-item .tags span.count {
            background: linear-gradient(135deg, #ec4899, #f472b6);
            color: #831843;
            border-color: #ec4899;
        }
        .project-item .tags span.count:hover {
            background: linear-gradient(135deg, #db2777, #ec4899);
            color: white;
            box-shadow: 0 2px 12px rgba(236, 72, 153, 0.35);
        }

        /* ===== 返回首页按钮 ===== */
        .back-link {
            margin-top: 32px;
        }

        .back-link a {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: #6c63ff;
            text-decoration: none;
            font-weight: 500;
            font-size: 15px;
            transition: color 0.2s;
            border-bottom: 2px solid transparent;
        }

        .back-link a:hover {
            color: #4a42b8;
            border-bottom-color: #4a42b8;
        }

        /* ===== 页脚 ===== */
        .footer {
            text-align: center;
            font-size: 14px;
            color: #64748b;
            padding-top: 22px;
            border-top: 1px solid rgba(255, 255, 255, 0.6);
            width: 100%;
            margin-top: 32px;
            letter-spacing: 0.3px;
        }

        .footer a {
            color: #6c63ff;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s;
        }

        .footer a:hover {
            color: #4a42b8;
            text-decoration: underline;
        }

        /* ===== 响应式 ===== */
        @media (max-width: 700px) {
            body {
                padding: 66px 16px 16px 16px;
            }
            .page-header h1 {
                font-size: 28px;
            }
            .project-item {
                padding: 18px 20px;
            }
            .project-item h3 {
                font-size: 17px;
            }
            .top-bar {
                padding: 10px 18px;
                gap: 8px;
            }
            .top-bar .site-title {
                font-size: 16px;
            }
            .top-bar .nav-link {
                font-size: 14px;
            }
        }

        @media (max-width: 400px) {
            .page-header h1 {
                font-size: 24px;
            }
            .project-item h3 {
                font-size: 15px;
                flex-wrap: wrap;
            }
            .project-item .status {
                margin-left: 0;
                font-size: 11px;
            }
            .top-bar .site-title {
                font-size: 14px;
            }
            .top-bar .nav-link {
                font-size: 13px;
            }
            .top-bar .nav-link::before {
                margin-right: 6px;
            }
        }
    </style>
</head>
<body>

    <div class="top-bar">
        <a href="index.html" class="site-title">BlueCat114 官方网站</a>
        <a href="project.html" class="nav-link active">项目</a>
        <a href="thankyou.html" class="nav-link">致谢</a>
    </div>

    <div class="main">

        <div class="page-header">
            <h1>📦 我的项目</h1>
            <p>一些我维护和开发的小工具</p>
        </div>

        <div class="project-list">

            <!-- 项目1：MCSkin3D 多语言版 -->
            <a href="mcskin3d.html" class="project-item">
                <h3>
                    ⛏️ MCSkin3D 多语言增强版
                    <span class="status">活跃维护</span>
                </h3>
                <p>为 MCSkin3D 添加 11 种语言支持，包含文件完整性修复工具和错误对照表。</p>
                <div class="tags">
                    <span class="lang">🌐 多语言</span>
                    <span class="featured">🛠️ 修复工具</span>
                    <span class="guide">📖 使用教程</span>
                    <span class="tool">📋 错误对照表</span>
                    <span class="count">📁 11 种语言</span>
                </div>
            </a>

        </div>

        <!-- 返回首页 -->
        <div class="back-link">
            <a href="index.html">← 返回首页</a>
        </div>

        <div class="footer">
            © <span id="year"></span> <a href="https://github.com/grass114">BlueCat114</a> · 用 ❤️ 和 ☕ 打造
        </div>

    </div>

    <script>
        document.getElementById('year').textContent = new Date().getFullYear();
    </script>

</body>
</html>
