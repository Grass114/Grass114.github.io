<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="favicon.png" type="image/png" />
    <title>项目 · BlueCat114</title>
    <style>
        /* ===== 字体加载 ===== */
        @font-face {
            font-family: 'Minecraft';
            src: url('Minecraft.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
        }

        /* ===== 颜色变量 ===== */
        :root {
            --bg-start: #f5f9ff;
            --bg-end: #e6edf7;
            --card-bg: rgba(255, 255, 255, 0.7);
            --card-border: rgba(255, 255, 255, 0.8);
            --text-primary: #0b1e33;
            --text-secondary: #1e293b;
            --text-muted: #64748b;
            --text-light: #94a3b8;
            --shadow-color: rgba(0, 20, 40, 0.08);
            --shadow-hover: rgba(0, 20, 40, 0.12);
            --badge-bg: rgba(30, 41, 59, 0.9);
            --badge-text: #f1f5f9;
            --topbar-bg: rgba(255, 255, 255, 0.6);
            --topbar-border: rgba(255, 255, 255, 0.8);
            --tag-bg: #eef2ff;
            --tag-text: #4338ca;
            --tag-border: #c7d2fe;
            --btn-shadow: rgba(108, 99, 255, 0.25);
            --btn-hover-shadow: rgba(108, 99, 255, 0.35);
            --footer-border: rgba(255, 255, 255, 0.6);
            --link-color: #6c63ff;
            --link-hover: #4a42b8;
            --intro-bg: rgba(255, 255, 255, 0.65);
            --intro-border: rgba(255, 255, 255, 0.8);
            --tag-lang: #10b981;
            --tag-featured: #6c63ff;
            --tag-guide: #06b6d4;
            --tag-tool: #f59e0b;
            --tag-count: #ec4899;
            --clock-color: var(--text-muted);
            --status-on: #22c55e;
            --status-off: #ef4444;
        }

        [data-theme="dark"] {
            --bg-start: #0f1724;
            --bg-end: #1a2332;
            --card-bg: rgba(30, 41, 59, 0.8);
            --card-border: rgba(71, 85, 105, 0.5);
            --text-primary: #e2e8f0;
            --text-secondary: #cbd5e1;
            --text-muted: #94a3b8;
            --text-light: #64748b;
            --shadow-color: rgba(0, 0, 0, 0.3);
            --shadow-hover: rgba(0, 0, 0, 0.4);
            --badge-bg: rgba(71, 85, 105, 0.9);
            --badge-text: #e2e8f0;
            --topbar-bg: rgba(15, 23, 36, 0.8);
            --topbar-border: rgba(71, 85, 105, 0.5);
            --tag-bg: #1e293b;
            --tag-text: #818cf8;
            --tag-border: #4f46e5;
            --btn-shadow: rgba(108, 99, 255, 0.15);
            --btn-hover-shadow: rgba(108, 99, 255, 0.25);
            --footer-border: rgba(71, 85, 105, 0.4);
            --link-color: #818cf8;
            --link-hover: #a5b4fc;
            --intro-bg: rgba(30, 41, 59, 0.7);
            --intro-border: rgba(71, 85, 105, 0.4);
            --tag-lang: #34d399;
            --tag-featured: #8b83f5;
            --tag-guide: #22d3ee;
            --tag-tool: #fbbf24;
            --tag-count: #f472b6;
            --clock-color: #94a3b8;
            --status-on: #4ade80;
            --status-off: #f87171;
        }

        /* ===== 全局重置 ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            height: 100%;
            width: 100%;
        }

        body {
            font-family: 'Minecraft', 'Microsoft YaHei', 'PingFang SC', sans-serif;
            background: linear-gradient(145deg, var(--bg-start) 0%, var(--bg-end) 100%);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            padding: 70px 24px 24px 24px;
            transition: background 0.4s ease, color 0.4s ease;
            color: var(--text-primary);
        }

        /* ===== 导航条 ===== */
        .top-bar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 1000;
            padding: 12px 28px;
            background: var(--topbar-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--topbar-border);
            box-shadow: 0 2px 12px var(--shadow-color);
            transition: background 0.4s ease, border-color 0.4s ease;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .top-bar-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .top-bar-center {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            font-size: 16px;
            font-weight: 500;
            color: var(--clock-color);
            letter-spacing: 0.5px;
            font-variant-numeric: tabular-nums;
            transition: color 0.4s;
            cursor: default;
            user-select: none;
        }
        .top-bar-center:hover {
            color: var(--link-color);
        }

        .top-bar .site-title {
            font-size: 18px;
            font-weight: 600;
            color: var(--text-primary);
            text-decoration: none;
            letter-spacing: 0.3px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: color 0.2s;
        }

        .top-bar .site-title:hover {
            color: var(--link-color);
        }

        .top-bar .site-title::before {
            content: "🏠";
            font-size: 20px;
        }

        .top-bar .nav-link {
            font-size: 16px;
            font-weight: 500;
            color: var(--text-secondary);
            text-decoration: none;
            transition: color 0.2s;
            padding: 4px 0;
            border-bottom: 2px solid transparent;
        }

        .top-bar .nav-link::before {
            content: "｜";
            margin-right: 10px;
            color: var(--text-light);
            font-weight: 300;
        }

        .top-bar .nav-link:hover {
            color: var(--link-color);
            border-bottom-color: var(--link-color);
        }

        .top-bar .nav-link.active {
            color: var(--link-color);
            border-bottom-color: var(--link-color);
        }

        .theme-toggle {
            background: none;
            border: none;
            font-size: 22px;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 30px;
            transition: background 0.3s;
            color: var(--text-primary);
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            line-height: 1;
        }

        .theme-toggle:hover {
            background: var(--tag-bg);
            transform: scale(1.1);
        }

        /* ===== 主容器 ===== */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            width: 100%;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px 0;
            position: relative;
        }

        .auto-toggle {
            position: absolute;
            top: 0;
            right: 0;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            padding: 4px 12px;
            border-radius: 20px;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            transition: all 0.3s;
            user-select: none;
            white-space: nowrap;
            z-index: 5;
            text-align: right;
            line-height: 1.6;
        }

        .auto-toggle:hover {
            transform: scale(1.05);
            border-color: var(--link-color);
        }

        .auto-toggle.on {
            color: var(--status-on);
        }

        .auto-toggle.off {
            color: var(--status-off);
        }

        .auto-toggle .hint {
            font-size: 12px;
            opacity: 0.7;
            display: block;
        }

        /* ===== 页面标题 ===== */
        .page-header {
            text-align: center;
            margin-bottom: 36px;
            width: 100%;
            margin-top: 30px;
        }

        .page-header h1 {
            font-size: 36px;
            font-weight: 700;
            color: var(--text-primary);
            letter-spacing: -0.3px;
            transition: color 0.4s;
        }

        .page-header p {
            color: var(--text-muted);
            font-size: 16px;
            margin-top: 8px;
            transition: color 0.4s;
        }

        /* ===== 项目列表 ===== */
        .project-list {
            display: flex;
            flex-direction: column;
            gap: 20px;
            width: 100%;
            max-width: 600px;
        }

        .project-item {
            background: var(--card-bg);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border-radius: 20px;
            padding: 24px 28px;
            border: 1px solid var(--card-border);
            box-shadow: 0 8px 28px var(--shadow-color);
            transition: all 0.25s ease, background 0.4s, border-color 0.4s, box-shadow 0.4s;
            text-decoration: none;
            color: inherit;
            display: block;
        }

        .project-item:hover {
            transform: translateY(-4px);
            box-shadow: 0 14px 40px var(--shadow-hover);
            border-color: rgba(108, 99, 255, 0.2);
        }

        .project-item h3 {
            font-size: 20px;
            font-weight: 600;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 10px;
            transition: color 0.4s;
        }

        .project-item .status {
            font-size: 12px;
            font-weight: 500;
            background: #d1fae5;
            color: #065f46;
            padding: 2px 12px;
            border-radius: 30px;
            margin-left: auto;
        }

        .project-item p {
            font-size: 15px;
            color: var(--text-secondary);
            margin-top: 6px;
            line-height: 1.6;
            transition: color 0.4s;
        }

        .project-item .tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 12px;
        }

        .project-item .tags span {
            font-size: 12px;
            font-weight: 500;
            padding: 4px 14px;
            border-radius: 30px;
            border: 1px solid;
            transition: all 0.2s;
            cursor: default;
        }

        .project-item .tags span:hover {
            transform: scale(1.06);
        }

        /* ----- 各标签配色 ----- */
        .project-item .tags span.lang {
            background: linear-gradient(135deg, var(--tag-lang), #34d399);
            color: #064e3b;
            border-color: var(--tag-lang);
        }
        .project-item .tags span.lang:hover {
            background: linear-gradient(135deg, #059669, var(--tag-lang));
            color: white;
            box-shadow: 0 2px 12px rgba(16, 185, 129, 0.35);
        }

        .project-item .tags span.featured {
            background: linear-gradient(135deg, var(--tag-featured), #8b83f5);
            color: white;
            border-color: var(--tag-featured);
            box-shadow: 0 2px 8px rgba(108, 99, 255, 0.25);
        }
        .project-item .tags span.featured:hover {
            background: linear-gradient(135deg, #5a52d5, #7a72e5);
            box-shadow: 0 4px 16px rgba(108, 99, 255, 0.35);
        }

        .project-item .tags span.guide {
            background: linear-gradient(135deg, var(--tag-guide), #22d3ee);
            color: #164e63;
            border-color: var(--tag-guide);
        }
        .project-item .tags span.guide:hover {
            background: linear-gradient(135deg, #0891b2, var(--tag-guide));
            color: white;
            box-shadow: 0 2px 12px rgba(6, 182, 212, 0.35);
        }

        .project-item .tags span.tool {
            background: linear-gradient(135deg, var(--tag-tool), #fbbf24);
            color: #78350f;
            border-color: var(--tag-tool);
        }
        .project-item .tags span.tool:hover {
            background: linear-gradient(135deg, #d97706, var(--tag-tool));
            color: white;
            box-shadow: 0 2px 12px rgba(245, 158, 11, 0.35);
        }

        .project-item .tags span.count {
            background: linear-gradient(135deg, var(--tag-count), #f472b6);
            color: #831843;
            border-color: var(--tag-count);
        }
        .project-item .tags span.count:hover {
            background: linear-gradient(135deg, #db2777, var(--tag-count));
            color: white;
            box-shadow: 0 2px 12px rgba(236, 72, 153, 0.35);
        }

        /* ===== 返回首页按钮 ===== */
        .back-link {
            margin-top: 32px;
        }

        .back-link a {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--link-color);
            text-decoration: none;
            font-weight: 500;
            font-size: 15px;
            transition: color 0.2s;
            border-bottom: 2px solid transparent;
        }

        .back-link a:hover {
            color: var(--link-hover);
            border-bottom-color: var(--link-hover);
        }

        /* ===== 页脚 ===== */
        .footer {
            text-align: center;
            font-size: 14px;
            color: var(--text-muted);
            padding-top: 22px;
            border-top: 1px solid var(--footer-border);
            width: 100%;
            margin-top: 32px;
            letter-spacing: 0.3px;
            transition: color 0.4s, border-color 0.4s;
        }

        .footer a {
            color: var(--link-color);
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s;
        }

        .footer a:hover {
            color: var(--link-hover);
            text-decoration: underline;
        }

        /* ===== 响应式 ===== */
        @media (max-width: 700px) {
            body {
                padding: 66px 16px 16px 16px;
            }
            .page-header h1 {
                font-size: 28px;
            }
            .project-item {
                padding: 18px 20px;
            }
            .project-item h3 {
                font-size: 17px;
            }
            .top-bar {
                padding: 10px 18px;
                gap: 8px;
            }
            .top-bar .site-title {
                font-size: 16px;
            }
            .top-bar .nav-link {
                font-size: 14px;
            }
            .top-bar-center {
                font-size: 13px;
            }
            .theme-toggle {
                font-size: 18px;
                padding: 3px 6px;
            }
            .auto-toggle {
                font-size: 13px;
                padding: 3px 10px;
                top: -4px;
                right: 0;
            }
            .page-header {
                margin-top: 24px;
            }
        }

        @media (max-width: 400px) {
            .page-header h1 {
                font-size: 24px;
            }
            .project-item h3 {
                font-size: 15px;
                flex-wrap: wrap;
            }
            .project-item .status {
                margin-left: 0;
                font-size: 11px;
            }
            .top-bar .site-title {
                font-size: 14px;
            }
            .top-bar .nav-link {
                font-size: 13px;
            }
            .top-bar .nav-link::before {
                margin-right: 6px;
            }
            .top-bar-center {
                font-size: 12px;
                position: static;
                transform: none;
                order: 3;
                width: 100%;
                text-align: center;
                margin-top: 2px;
            }
            .theme-toggle {
                font-size: 16px;
            }
            .auto-toggle {
                font-size: 12px;
                padding: 2px 8px;
                top: -2px;
                right: 0;
            }
            .page-header {
                margin-top: 20px;
            }
        }
    </style>
</head>
<body>

    <div class="top-bar">
        <div class="top-bar-left">
            <a href="index.html" class="site-title">BlueCat114 官方网站</a>
            <a href="project.html" class="nav-link active">项目</a>
            <a href="thankyou.html" class="nav-link">致谢</a>
        </div>
        <div class="top-bar-center" id="clockDisplay" title="双击恢复自动模式">--:--</div>
        <div class="top-bar-right">
            <button class="theme-toggle" id="themeToggle" aria-label="切换暗色/亮色模式">☀️</button>
        </div>
    </div>

    <div class="main">

        <div class="auto-toggle on" id="autoToggle">自动调节已开启！</div>

        <div class="page-header">
            <h1>📦 我的项目</h1>
            <p>一些我维护和开发的小工具</p>
        </div>

        <div class="project-list">

            <!-- 项目1：MCSkin3D 多语言版 -->
            <a href="mcskin3d.html" class="project-item">
                <h3>
                    ⛏️ MCSkin3D 多语言增强版
                    <span class="status">活跃维护</span>
                </h3>
                <p>为 MCSkin3D 添加 11 种语言支持，包含文件完整性修复工具和错误对照表。</p>
                <div class="tags">
                    <span class="lang">🌐 多语言</span>
                    <span class="featured">🛠️ 修复工具</span>
                    <span class="guide">📖 使用教程</span>
                    <span class="tool">📋 错误对照表</span>
                    <span class="count">📁 11 种语言</span>
                </div>
            </a>

        </div>

        <!-- 返回首页 -->
        <div class="back-link">
            <a href="index.html">← 返回首页</a>
        </div>

        <div class="footer">
            © <span id="year"></span> <a href="https://github.com/grass114">BlueCat114</a> · 用 ❤️ 和 ☕ 打造
        </div>

    </div>

    <script>
        document.getElementById('year').textContent = new Date().getFullYear();

        const clockDisplay = document.getElementById('clockDisplay');
        const toggle = document.getElementById('themeToggle');
        const html = document.documentElement;
        const autoToggle = document.getElementById('autoToggle');

        let isAutoMode = true;
        let currentTheme = 'light';

        function getThemeByHour() {
            const h = new Date().getHours();
            return (h >= 6 && h < 18) ? 'light' : 'dark';
        }

        function updateClock() {
            const now = new Date();
            const h = String(now.getHours()).padStart(2, '0');
            const m = String(now.getMinutes()).padStart(2, '0');
            clockDisplay.textContent = h + ':' + m;

            if (isAutoMode) {
                const target = getThemeByHour();
                if (target !== currentTheme) {
                    currentTheme = target;
                    html.setAttribute('data-theme', target);
                    toggle.textContent = target === 'dark' ? '🌙' : '☀️';
                }
            }
        }

        function updateAutoToggle() {
            if (isAutoMode) {
                autoToggle.innerHTML = '自动调节已开启！';
                autoToggle.className = 'auto-toggle on';
            } else {
                autoToggle.innerHTML = '自动调节已关闭！<br><span class="hint">（双击顶部时间恢复自动）</span>';
                autoToggle.className = 'auto-toggle off';
            }
        }

        autoToggle.addEventListener('click', function() {
            isAutoMode = !isAutoMode;
            updateAutoToggle();
            if (isAutoMode) {
                const target = getThemeByHour();
                currentTheme = target;
                html.setAttribute('data-theme', target);
                toggle.textContent = target === 'dark' ? '🌙' : '☀️';
            }
        });

        toggle.addEventListener('click', function() {
            if (isAutoMode) {
                isAutoMode = false;
                updateAutoToggle();
            }
            const current = html.getAttribute('data-theme');
            const next = current === 'dark' ? 'light' : 'dark';
            currentTheme = next;
            html.setAttribute('data-theme', next);
            toggle.textContent = next === 'dark' ? '🌙' : '☀️';
        });

        clockDisplay.addEventListener('dblclick', function() {
            isAutoMode = true;
            updateAutoToggle();
            const target = getThemeByHour();
            currentTheme = target;
            html.setAttribute('data-theme', target);
            toggle.textContent = target === 'dark' ? '🌙' : '☀️';
            updateClock();
        });

        const initTheme = getThemeByHour();
        currentTheme = initTheme;
        html.setAttribute('data-theme', initTheme);
        toggle.textContent = initTheme === 'dark' ? '🌙' : '☀️';
        updateAutoToggle();
        updateClock();
        setInterval(updateClock, 1000);
    </script>

</body>
</html>
